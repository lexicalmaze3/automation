target_url: "https://www.amy-mc.co.il/listings"   # client's own site — swap per client (canonical www host; bare domain redirects here)
rate_limit_seconds: 2
max_pages: 25
dedupe_key: listing_url

# Fetch layer (Stage 2). Honest, identifiable UA — no browser spoofing.
user_agent: "amymc-listings-bot/1.0 (+contact: yanaigazit10@gmail.com)"
request_timeout_seconds: 10      # connect + read timeout per request
max_retries: 3                   # transient errors only (5xx / connection / read timeout)
jitter_min_seconds: 0.5          # randomized delay added on top of rate_limit_seconds
jitter_max_seconds: 1.5

# How to advance to the next page. Stage 4 fills this in after inspecting the DOM.
#   mode: query   -> append ?page=N (param below) to target_url
#   mode: link    -> follow the "next" link matched by next_selector
#   mode: none    -> single page only
pagination:
  mode: none
  query_param: page
  start_page: 1
  next_selector:

fields:            # selectors discovered in Stage 3 by inspecting the page DOM
  title:
  price_ils:
  rooms:
  size_sqm:
  neighborhood:
  listing_url:
  date_listed:
  agent:

# The CSS selector that matches ONE listing container/row on the page.
# Each match becomes one output row; fields above are extracted relative to it.
row_selector:

output:
  csv_path: "./out/listings.csv"
  google_sheet_id: ""        # paste Sheet ID to enable; blank = CSV only
  sheet_tab: "listings"
